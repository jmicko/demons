schema_version = 5

[settings]
layout = "grid"
leader = "alt-j"
multi_click_ms = 500
logging = false
mcp_status_bar = true
watch_mode = "auto"
watch_poll_interval = "1s"

[[task]]
name = "server"
command = "cargo run"
cwd = "."
depends_on = []
watch = ["src", "Cargo.toml"]
watch_ignore = ["target"]
watch_delay = "250ms"

[task.env]

[[task]]
name = "web"
command = "npm run dev -- --host 0.0.0.0"
cwd = "./web"
depends_on = ["server"]
start_delay = "3s"

[task.env]
BROWSER = "none"

[[task]]
name = "logs"
command = ["tail", "-f", "/tmp/app.log"]
cwd = "."
depends_on = []

[task.env]

[[terminal]]
name = "scratch"
cwd = "."

[terminal.env]
DEMONS_PANE = "scratch"
