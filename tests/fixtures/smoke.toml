schema_version = 5

[settings]
layout = "grid"
leader = "alt-j"
multi_click_ms = 500
logging = false
mcp_status_bar = true

[[task]]
name = "restartable"
command = """
printf 'demon %s\n' "$PPID" >> /tmp/demons-smoke.log
printf 'shell %s\n' "$$" >> /tmp/demons-smoke.log
sleep 3600 &
child=$!
printf 'child %s\n' "$child" >> /tmp/demons-smoke.log
trap 'exit 0' TERM INT
wait "$child"
"""
cwd = "."
depends_on = []

[task.env]

[[task]]
name = "ansi"
command = [
  "sh",
  "-c",
  "printf '\\033[31mred\\033[0m\\n'; trap 'exit 0' TERM INT; while :; do sleep 1; done",
]
cwd = "."
depends_on = []

[task.env]
